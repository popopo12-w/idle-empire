<script>
/* ==============================================================
   1️⃣ УТИЛИТЫ
   ============================================================== */
const SF = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc',
            'Ud', 'Dd', 'Td', 'Qad', 'Qid', 'Sxd', 'Spd', 'Od', 'Nd',
            'Vg', 'Uvg', 'Dvg', 'Tvg', 'Qavg', 'Qivg', 'Sxvg', 'Spvg',
            'Ovg', 'Nvg', 'Tg', 'Utg', 'Dtg', 'Ttg', 'Qatg', 'Qitg',
            'Sxtg', 'Sptg', 'Otg', 'Ntg']; // 40‑ый
for (let i = SF.length; i < 1e3; i++) SF.push('e' + i * 3);

/* Форматирование чисел */
const F = n => {
  if (!isFinite(n)) return '∞';
  if (n < 1e4) return Math.floor(n).toLocaleString('ru');
  let i = 0;
  while (n >= 1e3 && i < SF.length - 1) { n /= 1e3; i++; }
  return (i >= SF.length - 1 && n >= 1e3 ? n.toExponential(2)
        : (n >= 100 ? Math.floor(n) : n >= 10 ? n.toFixed(1) : n.toFixed(2))) + SF[i];
};

/* Быстрый доступ к элементам */
const $ = id => document.getElementById(id);

/* Тост‑уведомления */
const toast = (msg, type='') => {
  const e = $('tst');
  e.textContent = msg;
  e.className = 'tst on ' + type;
  setTimeout(()=> e.classList.remove('on'), 3000);
};

/* Вспомогательные функции */
const SP = (b, e) => e === 0 ? 1 : e < 0 ? 1 / SP(b, -e) : Math.pow(b, e);
const fmtTime = s => {
  if (s < 60) return s + 'с';
  if (s < 3600) return Math.floor(s/60) + 'м ' + (s%60) + 'с';
  if (s < 86400) return Math.floor(s/3600) + 'ч ' + Math.floor((s%3600)/60) + 'м';
  return Math.floor(s/86400) + 'д ' + Math.floor((s%86400)/3600) + 'ч';
};
const today = () => {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
};

/* ==============================================================
   2️⃣ ДАННЫЕ И МАССИВЫ ПРОЧЕГО
   ============================================================== */
const CUR = [
  {i:'coins', ic:'🪙', c:'g'}, {i:'crystals', ic:'💎', c:'p'},
  {i:'stars', ic:'⭐', c:'y'}, {i:'energy', ic:'⚡', c:'o'},
  {i:'quantum', ic:'⚛️', c:'t'}, {i:'dark', ic:'☕', c:'b'},
  {i:'fragments', ic:'🧱', c:'c'}, {i:'sparks', ic:'⚡', c:'m'},
  {i:'dimCrystals', ic:'💎', c:'d'}, {i:'eternity', ic:'∞', c:'i'},
  {i:'omega', ic:'Ω', c:'v'}, {i:'absolute', ic:'✧', c:'a'}
];

/* В оригинальном файле массивы напоминали такие:
   (для простоты они оставлены пустыми – заполните тем, что вам нужно) */
const RB = [];   // Реинкарнации
const SH = [];   // Шипы/шарики
const PET = [];  // Питомцы
const REL = [];  // Реликвии
const EVT = [];  // События
const MER = [];  // Мерчанты
const ADS = [];  // Рекламные блоки
const DAILY = []; // Дневные задания

/* -------------------------------------------------
   3️⃣ СТАТЬЯ С СОХРАНЁННЫМ СОСТОЯНИЕМ
   ------------------------------------------------- */
const DEF = {
  v: '4.1',
  coins:0, crystals:0, stars:0, energy:0, quantum:0, dark:0,
  fragments:0, sparks:0, dimCrystals:0, eternity:0, omega:0, absolute:0,
  acm:1,
  inventoryItems: [], inventoryCurrency: [],
  spentOnSwitches:0, spentOnLights:0, spentOnOil:0, spentOnFire:0,
  spentOnMana:0, spentOnAo:0, spentOnAoePet:0, spentOnAttackGold:0,
  spentOnApex:0, spentOnThunder:0, spentOnGS:0, spentOnLightning:0,
  spentOnBlueCrown:0, spentOnBlackCrown:0, spentOnCrystalCrown:0,
  spentOnMoonglass:0, spentOnCoop:0, spentOnAntiCoop:0, spentOnGrey:0,
  spentOnRed:0, spentOnPurple:0, spentOnBlue:0, spentOnGreen:0,
  spentOnWar:0, spentOnWiz:0, spentOnQuest:0, spentOn{[/* остальные поля */]:0},
  totalSpent:0, totalEarned:0, totalSpentXP:0, totalTimer:0,
  totalEarnedXP:0, totalEarnedLevel:0, totalEarnedEncounters:0,
  totalEarnedCk:0,
  // ---------- события ----------
  event2:0, event3:0, event5:0, event7:0, event10:0, event12:0,
  event13:0, event14:0, event18:0, event19:0, event22:0,
  // ---------- прочее ----------
  adCooldowns:{},
  boostPassive2xEnd:0, boostPassive3xEnd:0,
  boostClick2xEnd:0,
  // ---------- массивы, нужные для инициализации ----------
  petLv: [], petEvo: [], rebirthCounts: {}, // будет заполнено ниже
  resetUpgLv_crystals: [], resetUpgLv_stars: [], resetUpgLv_energy: [],
  resetUpgLv_quantum: [], resetUpgLv_dark: [], resetUpgLv_fragments: [],
  resetUpgLv_sparks: [], resetUpgLv_dimCrystals: [], resetUpgLv_eternity: [],
  resetUpgLv_omega: [], resetUpgLv_absolute: [],
  achDone: [], challengesDone: []
};
let G = {...DEF};

/* ==============================================================
   4️⃣ Telegram‑интеграция (если запускается в Web App)
   ============================================================== */
let tg = window.Telegram?.WebApp,
    tgU = tg?.initDataUnsafe?.user,
    tgTh = tg?.themeParams;

/* ==============================================================
   5️⃣ ОДИНАРНЫЕ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
   ============================================================== */
let sbT=0,   // таймер автосохранения
    lgT=0,   // frame‑таймер (анимация)
    wT=0,    // волнa
    shT=0,   // shark
    lvT=0,   // leviathan
    cgT=0,   // guaranteed crit
    laFT=0,  // последний fire‑lay
    cbT=0,   // combo‑мат
    gldA=false,
    isRst=false,
    ofGn=0,
    pRst=null,
    pGn=0,
    pg='G'; // текущая открытая страница

/* ==============================================================
   6️⃣ ИНИТИАЛИЗАЦИЯ МАССИВОВ
   ============================================================== */
function initArrays() {
  /* Шипы/шарики */
  SH.forEach(s => {
    if (!G[s.k]) G[s.k] = Array(s.d.length).fill(0);
  });

  /* Питомцы */
  G.petLv = Array(PET.length).fill(1);
  G.petEvo = Array(PET.length).fill(0);

  /* Реинкарнации */
  RB.forEach(r => G.rebirthCounts[r.id] = G.rebirthCounts[r.id] || 0);

  /* Сброс‑апграды (если не созданы) */
  const resetKeys = [
    'resetUpgLv_crystals','resetUpgLv_stars','resetUpgLv_energy',
    'resetUpgLv_quantum','resetUpgLv_dark','resetUpgLv_fragments',
    'resetUpgLv_sparks','resetUpgLv_dimCrystals','resetUpgLv_eternity',
    'resetUpgLv_omega','resetUpgLv_absolute'
  ];
  resetKeys.forEach(k => { if (!G[k]) G[k] = []; });

  /* Достижения и челленджи */
  if (!G.achDone?.length)  G.achDone  = Array(100).fill(0);
  if (!G.challengesDone?.length) G.challengesDone = Array(10).fill(0);
}
initArrays();

/* ==============================================================
   7️⃣ Telegram UI / Haptic (не меняем)
   ============================================================== */
if (tg) {
  try {
    tg.ready();
    if (tg.expand) tg.expand();
    if (tgTh) {
      Object.entries(tgTh).forEach(([k,v]) => {
        document.documentElement.style.setProperty(

        );
      });
    }
  } catch(e){ console.warn('Telegram init error', e); }
}
function hI(s){ try{ tg?.HapticFeedback?.impactOccurred(s) } catch(e){} }
function hN(t){ try{ tg?.HapticFeedback?.notificationOccurred(t) } catch(e){} }
function hS(){ try{ tg?.HapticFeedback?.selectionChanged() } catch(e){} }

function upBB() {
  if (!tg?.BackButton) return;
  try {
    tg.BackButton[pg!=='G' || document.querySelector('.mod.on') ? 'show' : 'hide']();
  } catch(e){}
}
function bkH() {

    if (document.querySelector('.mod.on')) {

    } else if (pg!=='G') go('G');

/* ==============================================================
   8️⃣ Реклама (AdsGram)
   ============================================================== */
let rAd, iAd;
function adInit() {
  if (!window.Adsgram) { setTimeout(adInit,1000); return; }
  try{
    rAd = window.Adsgram.init({blockId:'37717'});
    iAd = window.Adsgram.init({blockId:'int-37718'});
    setInterval(()=> {
      if (iAd && !document.querySelector('.mod.on') && !isRst) iAd.show().catch(()=>{});
    },300_000);
  } catch(e){ console.warn('AdsGram init error', e); }
}
function adShw(mult,bst){
  if (!rAd) { toast('Реклама недоступна','er'); adInit(); return; }
  rAd.show().then(res=>{
    if (res.done) {
      const gain = bst
        ? Math.floor(getPS()*3600*0.7*2)
        : mult;
      G.coins += gain;
      G.totalEarned += gain;
      G.dailyEarned += gain;
      toast(`🎉 +${F(gain)} монет${bst?' (бустер)':''}!`,'sc');
      upUI(); save(); hI('medium');
    } else toast('Реклама не досмотрена','er');
  }).catch(()=>toast('Реклама недоступна','er'));
}

/* ==============================================================
   9️⃣ Математика – расчёт мультипликаторов
   ============================================================== */
function getM(){
  const m = {
    cm:1, pm:1, am:1, at:0, cc:0, cd:2, ds:0,
    of:0, cg:0, gf:1, gb:0, gm:1, cb:0, ct:0, dc:0,
    sc:0, sc2:0, uo:0, acm:1, rbm:0, om:0, cg2:0,
    ss:0, wh:0, sh:0, lv:0, cmx:0, bc:0, gc:0,
    dc2:0
  };
  PET.forEach((p,i)=>{
    const l = G.petLv[i], e = G.petEvo[i];
    if (l>1){
      const mu = 1 + (l-1)*p[5];
      switch(p[4]){
        case 'passive':   m.pm *= mu; break;
        case 'click':     m.cm *= mu; break;
        case 'auto':      m.at += (l-1)*p[5]; break;
        case 'discount':  m.ds += (l-1)*p[5]; break;
        case 'critChance':m.cc += (l-1)*p[5]; break;
        case 'crystals':  m.cg += (l-1)*p[5]; break;
        case 'whale':     m.wh = p[5]; break;
        case 'combo':     m.cb += (l-1)*p[5]; break;
        case 'critMult':  m.cd += (l-1)*p[5]; break;
        case 'all':       m.am *= mu; break;
        case 'shark':     m.sh = p[5]; break;
        case 'crysDiscount': m.dc += (l-1)*p[5]; break;
        case 'leviathan': m.lv = p[5]; break;
        case 'slowSpend': m.ss += (l-1)*p[5]; break;
        case 'goldenChance': m.gc += (l-1)*p[5]; break;
        case 'bonusCrystals': m.bc += (l-1)*p[5]; break;
        // … добавьте если понадобится …
      }
    }
  });

  const passive = G.coins * (G.tws ? G.tws/100 : 0);
  const critChance = (G.critChance||0) + (G.chr||0) + m.cc + m.cg + m.gc;
  const critMult = (G.critMultiplier||0) + (G.cmr||0) + m.cd;

  G.Pm = passive * (1 + (critChance/100)*(critMult/100));
  return m;
}

/* ==============================================================

/* ---- Сохранение / загрузка ---- */
function save(){
  try{
    const data = btoa(JSON.stringify(G));
    localStorage.setItem('idleEmpireSave', data);
    toast('Сохранено','sc');
  }catch(e){ toast('Ошибка сохранения','er'); }
}
function load(){
  try{
    const data = localStorage.getItem('idleEmpireSave');
    if (data){
      const obj = JSON.parse(atob(data));
      G = {...DEF, ...obj};
      toast('Загружено','sc');
    }
  }catch(e){ toast('Ошибка загрузки','er'); }
}

/* ---- Переход между страницами ---- */
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav li').forEach(li=>li.classList.remove('active'));
  $(`${page}`).classList.add('on');
  $(`${page}`).scrollTop = 0;
  pg = page;
  upBB();
}

/* ---- Клик по основной валюте ---- */
function click(){
  const gain = Math.floor(getPS() * (G.coefClick||1));
  G.coins += gain;
  G.totalEarned += gain;
  G.dailyEarned += gain;
  hI('light');
  upUI();
  save();
}

/* ---- Получить текущий PPS (при passive) ---- */
function getPS(){
  // Пример расчёта passive‑дохода; используйте свои формулы
  const m = getM();
  const base = G.coins * (G.tws? G.tws/100 : 0);
  const crit = (G.critChance||0) + (G.chr||0) + m.cc + m.cg;
  const critMult = (G.critMultiplier||0) + (G.cmr||0) + m.cd;
  return base * (1 + (crit/100)*(critMult/100));
}

/* ---- Обновление UI ---- */
function upUI(){

  const txt = `${F(G.coins)} ${CUR.find(c=>c.i==='coins').ic}`;

  const cd = G.adCooldowns?.adBtn || 0;

  $('adBtn').textContent = `📺 Показать рекламу (${left>0?'🟢'+left+'с':'🟢'})`;
}
